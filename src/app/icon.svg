<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="heat1" cx="35%" cy="65%" r="60%">
      <stop offset="0%" stop-color="#ff2d00" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#ff6b00" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ffaa00" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#ffe100" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffe100" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat2" cx="60%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ff4400" stop-opacity="0.85"/>
      <stop offset="20%" stop-color="#ff7700" stop-opacity="0.65"/>
      <stop offset="45%" stop-color="#ffcc00" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#88dd00" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00cc88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat3" cx="70%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#ff1100" stop-opacity="0.8"/>
      <stop offset="30%" stop-color="#ff5500" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#ffbb00" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#44ee44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat4" cx="25%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#ff6600" stop-opacity="0.7"/>
      <stop offset="35%" stop-color="#ffaa00" stop-opacity="0.45"/>
      <stop offset="65%" stop-color="#ccdd00" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#00bbcc" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Full square background, no clip-path -->
  <rect width="400" height="400" fill="#0a0a2e"/>

  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
  </g>

  <rect width="400" height="400" fill="url(#heat1)"/>
  <rect width="400" height="400" fill="url(#heat2)"/>
  <rect width="400" height="400" fill="url(#heat3)"/>
  <rect width="400" height="400" fill="url(#heat4)"/>

  <g fill="none" stroke-width="0.8" filter="url(#blur)">
    <ellipse cx="140" cy="260" rx="40" ry="55" stroke="#ffcc00" stroke-opacity="0.5" transform="rotate(-30 140 260)"/>
    <ellipse cx="140" cy="260" rx="60" ry="80" stroke="#ffaa00" stroke-opacity="0.4" transform="rotate(-30 140 260)"/>
    <ellipse cx="140" cy="260" rx="85" ry="110" stroke="#ff8800" stroke-opacity="0.3" transform="rotate(-30 140 260)"/>
    <ellipse cx="140" cy="260" rx="115" ry="145" stroke="#88cc00" stroke-opacity="0.25" transform="rotate(-30 140 260)"/>
    <ellipse cx="140" cy="260" rx="150" ry="180" stroke="#00aa88" stroke-opacity="0.2" transform="rotate(-30 140 260)"/>

    <ellipse cx="260" cy="140" rx="35" ry="50" stroke="#ffcc00" stroke-opacity="0.45" transform="rotate(-25 260 140)"/>
    <ellipse cx="260" cy="140" rx="55" ry="75" stroke="#ffaa00" stroke-opacity="0.35" transform="rotate(-25 260 140)"/>
    <ellipse cx="260" cy="140" rx="80" ry="105" stroke="#ff8800" stroke-opacity="0.25" transform="rotate(-25 260 140)"/>
    <ellipse cx="260" cy="140" rx="110" ry="140" stroke="#88cc00" stroke-opacity="0.2" transform="rotate(-25 260 140)"/>

    <ellipse cx="280" cy="280" rx="30" ry="40" stroke="#ffdd00" stroke-opacity="0.4" transform="rotate(-15 280 280)"/>
    <ellipse cx="280" cy="280" rx="50" ry="65" stroke="#ffaa00" stroke-opacity="0.3" transform="rotate(-15 280 280)"/>
    <ellipse cx="280" cy="280" rx="75" ry="95" stroke="#cc9900" stroke-opacity="0.2" transform="rotate(-15 280 280)"/>
  </g>

  <rect width="400" height="400" fill="#000022" opacity="0.15"/>
</svg>
